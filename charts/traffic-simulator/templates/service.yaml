apiVersion: v1
kind: Service
metadata:
  name: {{ include "traffic-simulator.fullname" . }}-service
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: {{ include "traffic-simulator.name" . }}
