# =============================================================
# Nginx Service
# - nginx Pod에 접근할 수 있게 네트워크를 열어주는 설정
# - Pod IP는 수시로 바뀌지만, Service는 고정 주소 제공 (DNS: nginx.nginx.svc)
# - 타입이 ClusterIP(기본값)이므로 클러스터 내부에서만 접근 가능
#   외부에서 접근하려면 kubectl port-forward 필요
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx
  labels:
    app.kubernetes.io/name: nginx
spec:
  selector:
    app.kubernetes.io/name: nginx   # 이 라벨을 가진 Pod에 트래픽을 전달

  ports:
    - name: http
      port: 80                      # Service가 노출하는 포트
      targetPort: 80                # 실제 Pod(nginx 컨테이너)의 포트로 전달
