# =============================================================
# Spring App Namespace
# - K8s 리소스를 논리적으로 격리하는 "폴더" 같은 개념
# - spring-app 관련 리소스(Pod, Service 등)가 전부 이 네임스페이스 안에 생성됨
# =============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: spring-app
  labels:
    app.kubernetes.io/name: spring-app  # K8s 표준 라벨 (리소스 식별용)
