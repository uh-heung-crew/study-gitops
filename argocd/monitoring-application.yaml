# Monitoring Stack (Prometheus + Grafana) - 로컬 Helm 차트로 관리
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/uh-heung-crew/study-gitops.git
    targetRevision: HEAD
    path: apps/monitoring           # 외부 차트 대신 로컬 Helm 차트를 참조

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
